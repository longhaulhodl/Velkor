services:
  # ==========================================================================
  # Infrastructure
  # ==========================================================================

  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-velkor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-velkor_secret}
      POSTGRES_DB: ${POSTGRES_DB:-velkor}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-velkor}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-velkor}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-velkor_secret}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ==========================================================================
  # Init jobs (run once, then exit)
  # ==========================================================================

  migrate:
    image: pgvector/pgvector:pg17
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
      - ./scripts:/scripts:ro
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-velkor}:${POSTGRES_PASSWORD:-velkor_secret}@postgres:5432/${POSTGRES_DB:-velkor}
    entrypoint: ["bash", "/scripts/init-db.sh"]
    restart: "no"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-velkor}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-velkor_secret}
      S3_BUCKET: ${S3_BUCKET:-velkor-documents}
    entrypoint: ["bash", "/scripts/init-minio.sh"]
    restart: "no"

  # ==========================================================================
  # Application services
  # ==========================================================================

  core:
    build:
      context: ./core
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      VELKOR_CONFIG: /app/config.yaml
      CORE_PORT: "3001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-velkor}:${POSTGRES_PASSWORD:-velkor_secret}@postgres:5432/${POSTGRES_DB:-velkor}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-velkor}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-velkor_secret}
      S3_BUCKET: ${S3_BUCKET:-velkor-documents}
      PLATFORM_SECRET_KEY: ${PLATFORM_SECRET_KEY:-change-me}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      RUST_LOG: info
    volumes:
      - ./config.docker.yaml:/app/config.yaml:ro
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/internal/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy
    environment:
      API_PORT: "3000"
      CORE_URL: http://core:3001
      JWT_SECRET: ${JWT_SECRET:-${PLATFORM_SECRET_KEY:-change-me}}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"

volumes:
  pgdata:
  redisdata:
  miniodata:
