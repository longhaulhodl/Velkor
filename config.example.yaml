platform:
  name: "Velkor"
  host: "0.0.0.0"
  port: 8080
  secret_key: "${PLATFORM_SECRET_KEY}"

database:
  postgres_url: "${DATABASE_URL:-postgresql://platform:platform@localhost:5432/agentplatform}"
  redis_url: "${REDIS_URL:-redis://localhost:6379}"
  s3:
    endpoint: "${S3_ENDPOINT:-http://localhost:9000}"
    access_key: "${S3_ACCESS_KEY}"
    secret_key: "${S3_SECRET_KEY}"
    bucket: "${S3_BUCKET:-agentplatform}"

providers:
  openrouter:
    api_key: "${OPENROUTER_API_KEY}"
    default_model: "anthropic/claude-sonnet-4-20250514"
  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    default_model: "claude-sonnet-4-20250514"
  openai:
    api_key: "${OPENAI_API_KEY}"
    default_model: "gpt-4o"
  ollama:
    base_url: "http://localhost:11434"
    default_model: "llama3.1:8b"

routing:
  strategy: "cost_optimized"
  fallback_chain:
    - "anthropic/claude-sonnet-4-20250514"
    - "openai/gpt-4o"
    - "ollama/llama3.1:8b"
  cost_limit_daily_usd: 10.00
  cost_limit_monthly_usd: 200.00

memory:
  embedding_model: "openai/text-embedding-3-small"
  embedding_dimensions: 1536
  auto_memorize: true
  user_modeling: true
  context_compression:
    strategy: "summarize"
    max_context_tokens: 100000

scheduling:
  enabled: true
  heartbeat_interval_seconds: 60
  timezone: "America/Chicago"

retention:
  default_conversation_days: 365
  default_memory_days: null
  default_document_days: null
  audit_log_days: 2555
  auto_purge: true
  purge_schedule: "0 2 * * *"

tools:
  web_search:
    provider: "auto"  # auto | tavily | brave | serper | perplexity | duckduckgo | none
    tavily_api_key: "${TAVILY_API_KEY}"
    brave_api_key: "${BRAVE_API_KEY}"
    serper_api_key: "${SERPER_API_KEY}"
    perplexity:
      api_key: "${PERPLEXITY_API_KEY}"
      # base_url auto-detected from key prefix: pplx-* → api.perplexity.ai, sk-or-* → openrouter.ai/api/v1
      # model defaults to sonar-pro (or perplexity/sonar-pro for OpenRouter)
    max_results: 5
  web_fetch:
    enabled: true
    max_content_length: 50000

channels:
  web:
    enabled: true
  api:
    enabled: true
    rate_limit_per_minute: 100
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"
  discord:
    enabled: false
    bot_token: "${DISCORD_BOT_TOKEN}"
  slack:
    enabled: false
    bot_token: "${SLACK_BOT_TOKEN}"
    app_token: "${SLACK_APP_TOKEN}"
